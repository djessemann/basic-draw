<!DOCTYPE html>
<html><head><style>
body { font-family: sans-serif; padding: 24px; background: #fff; }
.row { display: flex; gap: 16px; align-items: center; margin: 12px 0; }
.swatch { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #eee; }
.label { font-size: 14px; color: #333; width: 80px; }
.hex { font-size: 13px; color: #888; font-family: monospace; width: 80px; }
h3 { margin: 24px 0 8px; color: #555; }
</style></head><body>
<h2>Color Comparison</h2>
<div style="display:flex;gap:48px">
<div>
<h3>Current</h3>
<div class="row"><div class="swatch" style="background:#e74c3c"></div><div class="label">Red</div><div class="hex">#e74c3c</div></div>
<div class="row"><div class="swatch" style="background:#e67e22"></div><div class="label">Orange</div><div class="hex">#e67e22</div></div>
<div class="row"><div class="swatch" style="background:#f1c40f"></div><div class="label">Yellow</div><div class="hex">#f1c40f</div></div>
<div class="row"><div class="swatch" style="background:#2ecc71"></div><div class="label">Green</div><div class="hex">#2ecc71</div></div>
<div class="row"><div class="swatch" style="background:#3498db"></div><div class="label">Blue</div><div class="hex">#3498db</div></div>
</div>
<div>
<h3>Proposed</h3>
<div class="row"><div class="swatch" style="background:#c0392b"></div><div class="label">Red</div><div class="hex">#c0392b</div></div>
<div class="row"><div class="swatch" style="background:#f57c00"></div><div class="label">Orange</div><div class="hex">#f57c00</div></div>
<div class="row"><div class="swatch" style="background:#ffb300"></div><div class="label">Yellow</div><div class="hex">#ffb300</div></div>
<div class="row"><div class="swatch" style="background:#27ae60"></div><div class="label">Green</div><div class="hex">#27ae60</div></div>
<div class="row"><div class="swatch" style="background:#2980b9"></div><div class="label">Blue</div><div class="hex">#2980b9</div></div>
</div>
</div>
</body></html>
